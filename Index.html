<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Developer Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Particles -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</head>

<body>

    <div id="particles-js"></div>

    <header>

        <h2 class="logo">MyPortfolio</h2>

        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>

    </header>

    <section id="home" class="home">

        <div class="hero">

            <div class="text">

                <h1>Hello I'm</h1>

                <h2>MM.As_ath</h2>

                <h3><span id="typing"></span></h3>

                <p>Creative Web Developer</p>

                <div class="social">

                    <a href=""><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>

                </div>

            </div>

            <!-- 3D Floating Image -->

            <div class="profile">

                <img src="profile.jpg">

            </div>

        </div>

    </section>

    <section id="about" class="about">

        <h2>About Me</h2>

        <p>
            I am a web developer who builds modern web applications
            using HTML, CSS, JavaScript and C#.
        </p>

    </section>

    <section id="projects" class="projects">

        <h2>Projects</h2>

        <div class="project-container">

            <div class="project-card">Portfolio Website</div>
            <div class="project-card">Notes App</div>
            <div class="project-card">Reminder App</div>

        </div>

    </section>

    <section id="contact" class="contact">

        <h2>Contact Me</h2>

        <button>Hire Me</button>

    </section>

    <footer>

        <p>© My Developer Portfolio</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
